<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="RecipeBook" />
    <meta property="og:description" content="A collection of delicious recipes for every occasion." />
    <meta property="og:url" content="" />
    <meta property="og:image" content="images/images/apple-crisp.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RecipeBook" />
    <meta name="twitter:description" content="A collection of delicious recipes for every occasion." />
    <meta name="twitter:image" content="images/images/apple-crisp.jpg" />
    <link rel="icon" href="SwirlFavicon.ico" />
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
    <meta name="author" content="Jackson Clarke" />
    <link rel="stylesheet" href="recipes.css" />
    <title>Recipes</title>
  </head>
  <body>
    <header>
      <div id="logo">
        <img src="images/images/recipe-book.png" alt="Recipe Logo" />
        <h1>RecipeBook</h1>
      </div>
      <div class="search-wrapper">
        <input type="text" placeholder="Find a recipe" />
        <button type="button">
          <img src="images/images/search.svg" alt="Search" />
        </button>
      </div>
    </header>
    <main>
      <div class="recipe">
        <img
          src="images/images/apple-crisp.jpg"
          alt="Picture of an apple crisp"
        />
        <div class="recipe-info">
          <button class="tag">dessert</button>
          <h2>Apple Crisp</h2>
          <span
            class="rating"
            role="img"
            aria-label="Rating: 4 out of 5 stars"
          >
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star-empty">☆</span>
          </span>
          <p class="description">
            This apple crisp is a delicious and easy-to-make dessert that's
            perfect for fall and winter. Best served warm with a scoop of
            vanilla ice cream.
          </p>
        </div>
      </div>
    </main>
    <footer>
      <div class="social">
        <a href="#"><img src="images/images/instagram_icon.svg" alt="instagram icon" /></a>
        <a href="#"><img src="images/images/youtube_icon.svg" alt="youtube icon" /></a>
        <a href="#"><img src="images/images/pinterest_icon.svg" alt="pinterest icon" /></a>
      </div>
      <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons"
        >Recipe icons created by Freepik - Flaticon</a
      >
    </footer>
  </body>
</html>
