<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Fill in the meta tags with actual content -->
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Your Title" />
    <meta property="og:description" content="Your Description" />
    <meta property="og:url" content="Your URL" />
    <meta property="og:image" content="social-preview-image.png" />

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image" />
    <meta name="twitter:title" content="Your Title" />
    <meta name="twitter:description" content="Your Description" />
    <meta name="twitter:image" content="social-preview-image.png" />

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico" />

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
    <meta name="author" content="Jackson Clarke" />
    <link rel="stylesheet" href="recipes.css" />
    <title>Recipes</title>
  </head>
  <header>
    <div id="logo">
      <img src="images/images/recipe-book.png" alt="Recipe Logo" />
      <h1>RecipeBook</h1>
    </div>
    <div class="search-wrapper">
      <input type="text" placeholder="Find a recipe" />
      <button type="button">
        <img src="images/images/search.svg" alt="Search" />
      </button>
    </div>
  </header>
  <main>
    <body>
      <div class="container">
        <div class="recipe">
          <img
            src="images/images/apple-crisp.jpg"
            alt="Picture of an apple crisp"
          />
          <div class="recipe-info">
            <button class="tag">dessert</button>
            <h2>Apple Crisp</h2>
            <span
              class="rating"
              role="img"
              aria-label="Rating: 4 out of 5 stars"
            >
              <span aria-hidden="true" class="icon-star">⭐</span>
              <span aria-hidden="true" class="icon-star">⭐</span>
              <span aria-hidden="true" class="icon-star">⭐</span>
              <span aria-hidden="true" class="icon-star">⭐</span>
              <span aria-hidden="true" class="icon-star-empty">☆</span>
            </span>
            <p class="description">
              This apple crisp is a delicious and easy-to-make dessert that's
              perfect for fall and winter. Best served warm with a scoop of
              vanilla ice cream.
            </p>
          </div>
        </div>
      </div>
    </body>
  </main>
  <footer>
    <div class="container">
      <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
        <a href="#"
          ><img src="images/images/instagram_icon.svg" alt="instagram icon"
        /></a>
        <a href="#"
          ><img src="images/images/youtube_icon.svg" alt="youtube icon"
        /></a>
        <a href="#"
          ><img src="images/images/pinterest_icon.svg" alt="pinterest icon"
        /></a>
      </div>
      <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons"
        >Recipe icons created by Freepik - Flaticon</a
      >
    </div>
  </footer>
</html>
