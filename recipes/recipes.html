<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="RecipeBook" />
    <meta property="og:description" content="A collection of delicious recipes for every occasion." />
    <meta property="og:url" content="" />
    <meta property="og:image" content="./images/apple-crisp.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RecipeBook" />
    <meta name="twitter:description" content="A collection of delicious recipes for every occasion." />
    <meta name="twitter:image" content="./images/apple-crisp.jpg" />
    <link rel="icon" href="SwirlFavicon.ico" />
    <link rel="apple-touch-icon" href="./images/apple-crisp.jpg" />
    <meta name="author" content="Jackson Clarke" />
    <link rel="stylesheet" href="recipes.css" />
    <script src="recipes.js" defer></script>

    <title>Recipes</title>
  </head>
  <body>
    <header>
      <div id="logo">
        <img src="./images/recipe-book.png" alt="Recipe Logo" />
        <h1>RecipeBook</h1>
      </div>
      <div class="search-wrapper">
        <input id="search" type="text" placeholder="Find a recipe" />
        <button id="search-btn" type="button">
          <img src="./images/search.svg" alt="Search" />
        </button>
      </div>
    </header>
    <main>
      <div id="recipe-container"></div>

    </main>
    <footer>
      <div class="social">
        <a href="#"><img src="./images/instagram_icon.svg" alt="instagram icon" /></a>
        <a href="#"><img src="./images/youtube_icon.svg" alt="youtube icon" /></a>
        <a href="#"><img src="./images/pinterest_icon.svg" alt="pinterest icon" /></a>
      </div>
      <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons"
        >Recipe icons created by Freepik - Flaticon</a
      >
    </footer>
  </body>
</html>
