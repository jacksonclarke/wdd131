<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 380" width="480" height="380">
  <defs>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes fadeIn { from{opacity:0} to{opacity:1} }
      .cursor { animation: blink 1.1s step-end infinite; }
      .line1 { animation: fadeIn 0.3s ease 0.2s both; }
      .line2 { animation: fadeIn 0.3s ease 0.6s both; }
      .line3 { animation: fadeIn 0.3s ease 1.0s both; }
      .line4 { animation: fadeIn 0.3s ease 1.4s both; }
      .line5 { animation: fadeIn 0.3s ease 1.8s both; }
      .line6 { animation: fadeIn 0.3s ease 2.2s both; }
      .line7 { animation: fadeIn 0.3s ease 2.6s both; }
    </style>
  </defs>

  <!-- Card background -->
  <rect x="0" y="0" width="480" height="380" rx="14" fill="#141410"/>

  <!-- Subtle circuit traces in background -->
  <g opacity="0.07" stroke="#D4A84B" stroke-width="1" fill="none">
    <!-- Horizontal traces -->
    <line x1="0" y1="60" x2="120" y2="60"/>
    <line x1="360" y1="60" x2="480" y2="60"/>
    <line x1="0" y1="320" x2="100" y2="320"/>
    <line x1="380" y1="320" x2="480" y2="320"/>
    <!-- Vertical traces -->
    <line x1="40" y1="0" x2="40" y2="80"/>
    <line x1="40" y1="300" x2="40" y2="380"/>
    <line x1="440" y1="0" x2="440" y2="80"/>
    <line x1="440" y1="300" x2="440" y2="380"/>
    <!-- Corner nodes -->
    <circle cx="40" cy="60" r="3" fill="#D4A84B"/>
    <circle cx="440" cy="60" r="3" fill="#D4A84B"/>
    <circle cx="40" cy="320" r="3" fill="#D4A84B"/>
    <circle cx="440" cy="320" r="3" fill="#D4A84B"/>
    <!-- Extra traces -->
    <line x1="40" y1="60" x2="40" y2="320"/>
    <line x1="440" y1="60" x2="440" y2="320"/>
  </g>

  <!-- Subtle dot grid -->
  <g opacity="0.04" fill="#A8C5B5">
    <circle cx="80" cy="140" r="1.5"/>
    <circle cx="120" cy="140" r="1.5"/>
    <circle cx="160" cy="140" r="1.5"/>
    <circle cx="200" cy="140" r="1.5"/>
    <circle cx="240" cy="140" r="1.5"/>
    <circle cx="80" cy="180" r="1.5"/>
    <circle cx="120" cy="180" r="1.5"/>
    <circle cx="160" cy="180" r="1.5"/>
    <circle cx="200" cy="180" r="1.5"/>
    <circle cx="240" cy="180" r="1.5"/>
    <circle cx="280" cy="180" r="1.5"/>
    <circle cx="320" cy="180" r="1.5"/>
    <circle cx="360" cy="180" r="1.5"/>
    <circle cx="400" cy="180" r="1.5"/>
    <circle cx="80" cy="220" r="1.5"/>
    <circle cx="120" cy="220" r="1.5"/>
    <circle cx="160" cy="220" r="1.5"/>
    <circle cx="200" cy="220" r="1.5"/>
    <circle cx="280" cy="140" r="1.5"/>
    <circle cx="320" cy="140" r="1.5"/>
    <circle cx="360" cy="140" r="1.5"/>
    <circle cx="400" cy="140" r="1.5"/>
    <circle cx="240" cy="220" r="1.5"/>
    <circle cx="280" cy="220" r="1.5"/>
    <circle cx="320" cy="220" r="1.5"/>
    <circle cx="360" cy="220" r="1.5"/>
    <circle cx="400" cy="220" r="1.5"/>
  </g>

  <!-- Terminal window -->
  <rect x="48" y="54" width="384" height="272" rx="8" fill="#1A1915" stroke="#2A2A24" stroke-width="1"/>

  <!-- Terminal chrome bar -->
  <rect x="48" y="54" width="384" height="36" rx="8" fill="#222218"/>
  <rect x="48" y="76" width="384" height="14" fill="#222218"/>

  <!-- Traffic light dots -->
  <circle cx="74" cy="72" r="5.5" fill="#3A3A34"/>
  <circle cx="92" cy="72" r="5.5" fill="#3A3A34"/>
  <circle cx="110" cy="72" r="5.5" fill="#3A3A34"/>

  <!-- Terminal title -->
  <text x="240" y="76" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#7A7870">bash — 80×24</text>

  <!-- Terminal content -->
  <g font-family="'Courier New', monospace" font-size="13">

    <!-- Prompt line -->
    <g class="line1">
      <text x="70" y="118" fill="#A8C5B5">~</text>
      <text x="84" y="118" fill="#7A7870"> $ </text>
      <text x="108" y="118" fill="#F5F0E8">whoami</text>
    </g>

    <!-- Output: name -->
    <g class="line2">
      <text x="70" y="142">
        <tspan fill="#7A7870">name</tspan>
        <tspan fill="#3A3A34" dx="4">·············</tspan>
        <tspan fill="#F5F0E8" x="235">Jackson Clarke</tspan>
      </text>
    </g>

    <!-- Output: role -->
    <g class="line3">
      <text x="70" y="164">
        <tspan fill="#7A7870">role</tspan>
        <tspan fill="#3A3A34" dx="4">··············</tspan>
        <tspan fill="#D4A84B" x="235">software engineer</tspan>
      </text>
    </g>

    <!-- Output: focus -->
    <g class="line4">
      <text x="70" y="186">
        <tspan fill="#7A7870">focus</tspan>
        <tspan fill="#3A3A34" dx="4">·············</tspan>
        <tspan fill="#D4A84B" x="235">network security</tspan>
      </text>
    </g>

    <!-- Output: status -->
    <g class="line5">
      <text x="70" y="208">
        <tspan fill="#7A7870">status</tspan>
        <tspan fill="#3A3A34" dx="4">············</tspan>
        <tspan fill="#A8C5B5" x="235">graduating '26</tspan>
      </text>
    </g>

    <!-- Output: skills -->
    <g class="line6">
      <text x="70" y="230">
        <tspan fill="#7A7870">skills</tspan>
        <tspan fill="#3A3A34" dx="4">············</tspan>
        <tspan fill="#F5F0E8" x="235">full-stack · cyber</tspan>
      </text>
    </g>

    <!-- Divider -->
    <g class="line6">
      <text x="70" y="252" fill="#2A2A24">────────────────────────────────────────</text>
    </g>

    <!-- Second prompt -->
    <g class="line7">
      <text x="70" y="274" fill="#A8C5B5">~</text>
      <text x="84" y="274" fill="#7A7870"> $ </text>
      <text x="108" y="274" fill="#F5F0E8">_</text>
      <text x="108" y="274" class="cursor" fill="#D4A84B">▌</text>
    </g>

  </g>

  <!-- Gold accent bar left edge -->
  <rect x="48" y="90" width="3" height="0" rx="1" fill="#D4A84B" opacity="0">
    <animate attributeName="height" from="0" to="236" dur="0.6s" begin="0.1s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="0.6" dur="0.3s" begin="0.1s" fill="freeze"/>
  </rect>

  <!-- Bottom label strip -->
  <rect x="0" y="340" width="480" height="40" rx="0" fill="#0E0E0C"/>
  <rect x="0" y="340" width="480" height="5" fill="#0E0E0C"/>
  <rect x="0" y="352" width="480" height="28" rx="0" fill="#0E0E0C"/>
  <rect x="0" y="366" width="480" height="14" rx="0" fill="#0E0E0C"/>
  <rect x="0" y="352" width="480" height="28" fill="#0E0E0C"/>
  <!-- Rounded bottom corners mask -->
  <rect x="0" y="340" width="480" height="40" rx="0" fill="#0E0E0C"/>
  <rect x="0" y="352" width="480" height="28" fill="none"/>

  <!-- Stats row -->
  <rect x="0" y="330" width="480" height="50" rx="0" fill="#111110"/>
  <rect x="0" y="356" width="480" height="24" fill="#111110"/>
  <!-- round bottom corners -->
  <rect x="0" y="330" width="480" height="50" rx="14" fill="#111110"/>
  <rect x="0" y="330" width="480" height="25" fill="#111110"/>

  <g font-family="'Courier New', monospace">
    <!-- Stat 1 -->
    <text x="96" y="348" text-anchor="middle" font-size="16" fill="#D4A84B" font-weight="bold">4+</text>
    <text x="96" y="365" text-anchor="middle" font-size="9" fill="#7A7870">yrs coding</text>

    <!-- divider -->
    <line x1="178" y1="336" x2="178" y2="370" stroke="#2A2A24" stroke-width="1"/>

    <!-- Stat 2 -->
    <text x="240" y="348" text-anchor="middle" font-size="16" fill="#D4A84B" font-weight="bold">12+</text>
    <text x="240" y="365" text-anchor="middle" font-size="9" fill="#7A7870">labs completed</text>

    <!-- divider -->
    <line x1="302" y1="336" x2="302" y2="370" stroke="#2A2A24" stroke-width="1"/>

    <!-- Stat 3 -->
    <text x="384" y="348" text-anchor="middle" font-size="16" fill="#A8C5B5" font-weight="bold">Sec+</text>
    <text x="384" y="365" text-anchor="middle" font-size="9" fill="#7A7870">exam ready</text>
  </g>

</svg>
