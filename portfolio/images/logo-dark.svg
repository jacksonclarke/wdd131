<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <defs>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .cursor { animation: blink 1.1s step-end infinite; }
    </style>
  </defs>

  <!-- Dark background pill -->
  <rect x="0" y="0" width="220" height="60" rx="8" fill="#141410"/>

  <!-- Subtle border -->
  <rect x="0" y="0" width="220" height="60" rx="8" fill="none" stroke="#D4A84B" stroke-width="0.75" opacity="0.3"/>

  <!-- Top-left circuit corner detail -->
  <line x1="0" y1="18" x2="10" y2="18" stroke="#D4A84B" stroke-width="0.75" opacity="0.4"/>
  <line x1="10" y1="18" x2="10" y2="0" stroke="#D4A84B" stroke-width="0.75" opacity="0.4"/>
  <circle cx="10" cy="18" r="1.5" fill="#D4A84B" opacity="0.5"/>

  <!-- Bottom-right circuit corner detail -->
  <line x1="220" y1="42" x2="210" y2="42" stroke="#D4A84B" stroke-width="0.75" opacity="0.4"/>
  <line x1="210" y1="42" x2="210" y2="60" stroke="#D4A84B" stroke-width="0.75" opacity="0.4"/>
  <circle cx="210" cy="42" r="1.5" fill="#D4A84B" opacity="0.5"/>

  <!-- Prompt symbol -->
  <text x="16" y="38" font-family="'Courier New', monospace" font-size="18" fill="#A8C5B5" font-weight="bold">&gt;</text>

  <!-- JTC in gold -->
  <text x="34" y="38" font-family="'Courier New', monospace" font-size="22" fill="#D4A84B" font-weight="bold">JTC</text>

  <!-- .dev in parchment -->
  <text x="100" y="38" font-family="'Courier New', monospace" font-size="22" fill="#F5F0E8" font-weight="normal">.dev</text>

  <!-- Blinking cursor -->
  <rect class="cursor" x="163" y="18" width="10" height="22" rx="1" fill="#D4A84B" opacity="0.85"/>

</svg>
