<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Jackson Clarke" />
    <meta name="description" content="Credit Card Form Assignment" />
    <link rel="stylesheet" href="credit.css" />
    <script src="credit.js" defer></script>
    <link rel="icon" href="SwirlFavicon.ico" />

    <title>CreditCard Form</title>
  </head>
  <body>
    <main>
      <form id="form-grid" autocomplete="off">
        <div class="card-back">
          <div class="card-back_stripe"></div>
          <div class="card-back_cvc-area">
            <label class="card-back_cvc-label" for="cvc">CVC/CVV</label>
            <input
              class="card-back_cvc-input"
              type="text"
              id="cvc"
              name="cvc"
              placeholder="CVC"
            />
          </div>
        </div>

        <div class="card-front">
          <div class="card-front_total">TOTAL: $199</div>
          <div class="chip-icon" aria-hidden="true">
            <span>💳</span>
          </div>

          <div class="card-front_number-group">
            <label class="field-label" for="card-number">Card Number</label>
            <input
              class="field-input"
              type="text"
              id="card-number"
              name="cardNumber"
              maxlength="19"
              placeholder="1234 5678 9101 1020"
            />
          </div>

          <div class="card-holder">
            <label class="field-label" for="card-holder">Card Holder</label>
            <input
              class="field-input"
              type="text"
              id="card-holder"
              name="cardHolder"
              placeholder="John Doe"
            />
          </div>

          <div
            id="cardExpiration"
            role="group"
            aria-labelledby="expiration-label"
          >
            <label id="expiration-label">EXPIRATION</label>
            <input
              type="text"
              id="month"
              name="expMonth"
              placeholder="MM"
              aria-labelledby="expiration-label"
            />
            <input
              type="text"
              id="year"
              name="expYear"
              placeholder="YY"
              aria-labelledby="expiration-label"
            />
          </div>
        </div>

        <p id="form-error" class="form-error" role="alert"></p>
        <div class="form-grid_submit-row">
          <button class="btn-submit" type="submit">Submit</button>
        </div>
      </form>

      <div id="form-success" class="form-success" hidden>
        <p>Payment Submitted!</p>
        <p>Thank you for your purchase.</p>
      </div>
    </main>
  </body>
</html>
